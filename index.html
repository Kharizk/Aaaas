
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- ERROR HANDLER & POLYFILLS -->
    <script>
      window.process = window.process || { env: { NODE_ENV: 'production', API_KEY: '' } };
      
      window.addEventListener('error', function(e) {
        const errorBox = document.getElementById('fatal-error');
        if (errorBox) {
          errorBox.style.display = 'block';
          errorBox.innerHTML = '<strong>System Error:</strong> ' + (e.message || 'Unknown Error');
        }
        console.error(e);
      });

      window.addEventListener('unhandledrejection', function(e) {
        const errorBox = document.getElementById('fatal-error');
        if (errorBox) {
          errorBox.style.display = 'block';
          errorBox.innerHTML = '<strong>Promise Error:</strong> ' + (e.reason ? e.reason.toString() : 'Unhandled Rejection');
        }
        console.error("Unhandled Rejection:", e.reason);
      });

      // Fallback: If React doesn't take over within 5 seconds, show an error (or hint)
      setTimeout(function() {
        const root = document.getElementById('root');
        // Check if the loading spinner is still the only content
        if (root && root.innerHTML.includes('جاري تحميل النظام')) {
           const statusDiv = document.createElement('div');
           statusDiv.style.cssText = 'color:red; font-weight:bold; margin-top:10px; font-size:12px; text-align:center; direction: rtl;';
           statusDiv.innerHTML = 'استغرق التحميل وقتاً أطول من المعتاد.<br/>يرجى التحقق من الاتصال أو تحديث الصفحة.<br/>إذا استمرت المشكلة، قد يكون هناك خطأ في إعدادات البيئة (Firebase/Vite).';
           // Append only if not already there
           if (!root.innerText.includes('استغرق التحميل')) {
               root.querySelector('div').appendChild(statusDiv);
           }
        }
      }, 6000);

      // --- CUSTOM GLOBAL TOAST (Overrides native alert) ---
      window._nativeAlert = window.alert;
      window.alert = function(message) {
          if(!message) return;
          let toastContainer = document.getElementById('global-toast-container');
          if (!toastContainer) {
              toastContainer = document.createElement('div');
              toastContainer.id = 'global-toast-container';
              toastContainer.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-3 pointer-events-none items-center w-full max-w-sm px-4';
              document.body.appendChild(toastContainer);
          }

          const toast = document.createElement('div');
          toast.className = 'w-full bg-[#1e293b] text-white px-5 py-4 rounded-xl shadow-2xl text-sm font-bold opacity-0 translate-y-6 scale-95 transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] pointer-events-auto flex items-start gap-4 border border-slate-700/50';
          
          let iconHtml = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:1px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
          if (String(message).includes('نجاح') || String(message).includes('تم ')) {
               iconHtml = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:1px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
          } else if (String(message).includes('خطأ') || String(message).includes('فشل') || String(message).includes('غير صحيح')) {
               iconHtml = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:1px;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
          }

          toast.innerHTML = iconHtml + `<span style="font-family: inherit; line-height: 1.5; padding-top:2px;" class="flex-1 text-right" dir="rtl">${message}</span>`;
          toastContainer.appendChild(toast);

          requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                  toast.classList.remove('opacity-0', 'translate-y-6', 'scale-95');
                  toast.classList.add('opacity-100', 'translate-y-0', 'scale-100');
              });
          });

          setTimeout(() => {
              toast.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
              toast.classList.add('opacity-0', 'translate-y-4', 'scale-95');
              setTimeout(() => {
                  if (toast.parentElement) toast.parentElement.removeChild(toast);
              }, 400); 
          }, 3500);
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cairo', 'Segoe UI', 'sans-serif'],
              mono: ['Consolas', 'Monaco', 'monospace'],
            },
            borderRadius: {
              'sap-s': '2px', 
              'sap-m': '4px', 
              'sap-l': '8px', 
              'm3-s': '4px',
              'm3-m': '8px',
              'm3-l': '16px',
              'm3-xl': '24px',
              'm3-full': '9999px',
            },
            colors: {
              sap: {
                primary: 'var(--sap-primary, #800020)',
                'primary-hover': 'var(--sap-primary-hover, #5e0018)',
                secondary: 'var(--sap-secondary, #C5A059)',
                shell: 'var(--sap-shell, #2D3748)',
                background: 'var(--sap-background, #F9FAFB)',
                surface: 'var(--sap-surface, #ffffff)',
                border: 'var(--sap-border, #E2E8F0)',
                text: 'var(--sap-text, #1A202C)',
                'text-variant': 'var(--sap-text-variant, #718096)',
                success: '#059669',
                error: '#DC2626',
                warning: '#D97706',
                highlight: 'var(--sap-highlight, #FDF2F8)'
              }
            },
            boxShadow: {
              'sap-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
              'sap-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
              'glow': '0 0 15px rgba(128, 0, 32, 0.15)'
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #F3F4F6;
            color: #1A202C;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            font-size: 13px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Smooth input focus transitions */
        input, select, textarea, button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Subtle interactive scales */
        button:active {
            transform: scale(0.97);
        }

        /* Improved Focus Rings */
        *:focus-visible {
            outline: 2px solid #C5A059;
            outline-offset: 2px;
        }

        /* Improved Shadows & Table rows */
        tr {
            transition: background-color 0.15s ease;
        }

        /* Odoo-like Scrollbar (Refined) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Odoo Table Style Override */
        table { border-collapse: separate; border-spacing: 0; }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        @media print {
            html, body, #root, main { 
                overflow: visible !important; 
                height: auto !important; 
                max-height: none !important; 
                display: block !important;
                position: static !important;
            }
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible !important; }
            .printable, .printable * { visibility: visible !important; }
            
            #print-container:not(:empty) ~ #root {
                display: none !important;
            }

            #print-container {
                position: static !important;
                margin: 0 !important; padding: 0 !important;
                display: block !important;
                background: white !important;
                width: 100% !important; height: auto !important; min-height: 100% !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                z-index: 9999;
            }
            
            .printable {
                position: static !important;
                width: 100% !important; height: auto !important; min-height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                z-index: 9999;
            }
        }

        .print-only-overlay { display: none; }
        @media print { .print-only-overlay { display: block !important; } }
        
        #fatal-error {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px; background: #EF4444; color: white;
            font-weight: bold; z-index: 10000; text-align: center;
            font-size: 12px;
            direction: ltr;
        }
    </style>
<script type="importmap">
{
  "imports": {

</head>
  <body class="bg-[#F3F4F6] text-sap-text font-sans overflow-hidden text-sm selection:bg-sap-primary selection:text-white">
    <!-- Error Display -->
    <div id="fatal-error"></div>

    <!-- Dedicated container for printing -->
    <div id="print-container" class="print-only-overlay"></div>

    <!-- Root container -->
    <div id="root" class="h-screen w-screen flex flex-col">
        <!-- Initial Loading State -->
        <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F9FAFB; animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);">
            <div style="position: relative; width: 80px; height: 80px; margin-bottom: 32px;">
                <div style="position: absolute; inset: 0; border: 4px solid #E2E8F0; border-radius: 50%;"></div>
                <div style="position: absolute; inset: 0; border: 4px solid transparent; border-top-color: #800020; border-right-color: #800020; border-radius: 50%; opacity: 0.9; animation: spin-smooth 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
            </div>
            <div style="font-weight: 900; font-size: 28px; color: #1A202C; letter-spacing: -0.5px; margin-bottom: 12px; font-family: 'Segoe UI', system-ui, sans-serif;">StoreFlow</div>
            <div style="display: flex; gap: 6px; align-items: center;">
                <div style="width: 6px; height: 6px; border-radius: 50%; background-color: #C5A059; animation: pulse-dot 1.4s infinite;"></div>
                <div style="font-size: 14px; color: #64748B; font-weight: 500;">تهيئة بيئة العمل...</div>
            </div>
            <style>
                @keyframes spin-smooth { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                @keyframes fade-in { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
                @keyframes pulse-dot { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
            </style>
        </div>
    </div>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
